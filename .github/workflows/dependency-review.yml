name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      # Requires the repository's Dependency graph to be enabled (public repos have it
      # by default; private repos need GitHub Advanced Security). If unavailable, replace
      # this step with OSV-Scanner over a committed Gradle lockfile.
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
