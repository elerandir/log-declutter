name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Monday 03:17 UTC.
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
